<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NYC Subway Tracker</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw; height: 100vh;
      overflow: hidden;
      background: #2a2a3e;
      font-family: Helvetica, Arial, sans-serif;
      display: flex;
    }

    /* ── Map ── */
    #map-container {
      flex: 1;
      overflow: hidden;
      position: relative;
      cursor: grab;
      user-select: none;
      -webkit-user-select: none;
    }
    #map-container.dragging { cursor: grabbing; }

    /* The single viewport div that gets CSS-transformed for pan/zoom.
       Using will-change: transform promotes it to a compositor layer so
       panning is a zero-cost GPU operation. */
    #map-viewport {
      position: absolute;
      top: 0; left: 0;
      transform-origin: 0 0;
      will-change: transform;
    }

    /* Map displayed as an <img> so the browser rasterises it once and
       subsequent pan/zoom composites at GPU speed with no SVG repaint. */
    #map-img { display: block; }

    /* Lightweight overlay SVG: only hit-target rects + visited markers.
       Both layers share the same 2208×2688 viewBox as the map image. */
    #overlay-svg {
      position: absolute;
      top: 0; left: 0;
      overflow: visible; /* markers at edges shouldn't be clipped */
    }

    /* ── Visited marker style ── */
    .visited-marker {
      pointer-events: none;
      fill: rgba(34, 197, 94, 0.22);
      stroke: #22c55e;
      stroke-width: 3.5;
    }

    /* ── Panel ── */
    #panel {
      width: 220px; min-width: 220px;
      height: 100vh;
      background: #fff;
      display: flex; flex-direction: column;
      padding: 20px 14px 16px;
      gap: 14px;
      z-index: 10;
      box-shadow: -6px 0 24px rgba(0,0,0,0.35);
    }
    #panel-title {
      font-size: 11px; font-weight: bold;
      text-align: center; color: #555;
      text-transform: uppercase; letter-spacing: 1.5px;
    }
    .stat-block { text-align: right; }
    .stat-number {
      font-size: 44px; font-weight: bold;
      color: #111; line-height: 1; letter-spacing: -1px;
    }
    .stat-number .denom { font-size: 26px; color: #888; font-weight: normal; }
    .stat-label {
      font-size: 9px; font-weight: bold; color: #aaa;
      text-transform: uppercase; letter-spacing: 1px; margin-top: 2px;
    }
    .progress-bar {
      height: 5px; background: #ececec;
      border-radius: 3px; margin-top: 8px; overflow: hidden;
    }
    .progress-fill { height: 100%; border-radius: 3px; width: 0%; transition: width 0.35s ease; }
    #stations-progress-fill { background: #22c55e; }
    #services-progress-fill { background: #3b82f6; }
    .stat-divider { border: none; border-top: 1px solid #efefef; }
    .stat-block.small .stat-number { font-size: 30px; }
    .stat-block.small .stat-number .denom { font-size: 18px; }
    #instructions {
      flex: 1; display: flex; align-items: center; justify-content: center;
      text-align: center; font-size: 11px; color: #bbb; line-height: 1.6; padding: 0 4px;
    }
    #panel-bottom { display: flex; gap: 8px; }
    .panel-btn {
      flex: 1; padding: 9px 6px; border: none; border-radius: 20px;
      font-size: 11px; font-weight: bold; letter-spacing: 0.5px;
      cursor: pointer; transition: opacity 0.15s;
    }
    .panel-btn:hover { opacity: 0.85; }
    #btn-reset { background: #ececec; color: #444; }
    #btn-share { background: #9a38a1; color: #fff; }

    /* ── Loading overlay ── */
    #loading {
      position: fixed; inset: 0; background: #2a2a3e;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px; z-index: 200; color: #fff;
    }
    #loading h1 { font-size: 22px; font-weight: bold; letter-spacing: 1px; }
    #loading p  { font-size: 13px; color: #aaa; }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(30,30,30,0.92); color: #fff;
      padding: 10px 18px; border-radius: 20px;
      font-size: 13px; font-weight: bold;
      pointer-events: none;
      transition: transform 0.3s ease, opacity 0.3s ease;
      opacity: 0; z-index: 100; white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  </style>
</head>
<body>

<div id="loading">
  <h1>NYC Subway Tracker</h1>
  <p>Loading map…</p>
</div>

<div id="map-container">
  <div id="map-viewport">
    <img id="map-img" width="2208" height="2688" alt="NYC Subway Map">
    <svg id="overlay-svg" viewBox="0 0 2208 2688" width="2208" height="2688">
      <!-- visited-overlay is rendered first (below), then hit-layer on top -->
      <g id="visited-overlay" style="pointer-events:none"></g>
      <g id="hit-layer"       style="pointer-events:all"></g>
    </svg>
  </div>
</div>

<div id="panel">
  <div id="panel-title">NYC Subway Tracker</div>

  <div class="stat-block">
    <div class="stat-number">
      <span id="stations-visited">0</span><span class="denom"> / <span id="stations-total">446</span></span>
    </div>
    <div class="stat-label">Stations Visited</div>
    <div class="progress-bar"><div class="progress-fill" id="stations-progress-fill"></div></div>
  </div>

  <hr class="stat-divider">

  <div class="stat-block small">
    <div class="stat-number">
      <span id="services-ridden">0</span><span class="denom"> / <span id="services-total">27</span></span>
    </div>
    <div class="stat-label">Services Ridden</div>
    <div class="progress-bar"><div class="progress-fill" id="services-progress-fill"></div></div>
  </div>

  <div id="instructions">
    Click a station on the map to mark it visited.<br><br>
    Scroll to zoom &nbsp;·&nbsp; Drag to pan
  </div>

  <div id="panel-bottom">
    <button class="panel-btn" id="btn-reset">Reset</button>
    <button class="panel-btn" id="btn-share">Share</button>
  </div>
</div>

<div id="toast"></div>

<script>
  // ─── Constants ──────────────────────────────────────────────────────────────
  const SVG_W    = 2208;
  const SVG_H    = 2688;
  const MIN_SCALE = 0.12;
  const MAX_SCALE = 3.0;
  // Cluster gap: paths within the same station that are ≤ this many SVG units
  // apart (edge-to-edge) get merged into one marker rect. Larger gaps keep
  // spread-out station components (e.g. Chambers St complex) as separate rects.
  const CLUSTER_GAP = 12;
  const HIT_PAD     = 5;   // SVG units of extra padding on hit targets
  const MARK_PAD    = 2;   // SVG units of extra padding on visited markers
  const MIN_HIT_DIM = 14;  // minimum hit-target dimension (SVG units)
  const MIN_MARK_DIM = 10; // minimum marker dimension (SVG units)

  // ─── State ──────────────────────────────────────────────────────────────────
  let stationData     = {};
  let totalStations   = 0;
  let visitedStations = new Set();
  // stationId → [{x, y, x2, y2}, …]  (SVG root coordinates, pre-clustered)
  let stationClusters = {};

  // ─── DOM refs ───────────────────────────────────────────────────────────────
  const mapContainer   = document.getElementById('map-container');
  const mapViewport    = document.getElementById('map-viewport');
  const overlaySvg     = document.getElementById('overlay-svg');
  const hitLayer       = document.getElementById('hit-layer');
  const visitedOverlay = document.getElementById('visited-overlay');
  const loadingEl      = document.getElementById('loading');
  const toastEl        = document.getElementById('toast');

  // ─── Pan / zoom state ───────────────────────────────────────────────────────
  let scale = 0.3, translateX = 0, translateY = 0;
  let isDragging = false, pointerMoved = false;
  let lastMouseX = 0, lastMouseY = 0;

  // rAF-batched transform: at most one DOM write per frame.
  // The callback reads translateX/Y/scale at execution time so it always
  // captures the latest values even if called many times per frame.
  let _rafPending = false;
  function applyTransform() {
    if (_rafPending) return;
    _rafPending = true;
    requestAnimationFrame(() => {
      _rafPending = false;
      mapViewport.style.transform =
        `translate3d(${translateX}px,${translateY}px,0) scale(${scale})`;
    });
  }

  // During pan/zoom, temporarily disable pointer-events on the overlay so the
  // browser skips SVG hit-testing (expensive with many rects).
  let _ptrTimer = null;
  function suspendHitTest() {
    overlaySvg.style.pointerEvents = 'none';
    clearTimeout(_ptrTimer);
    _ptrTimer = setTimeout(() => { overlaySvg.style.pointerEvents = ''; }, 150);
  }

  // ─── Bbox computation ───────────────────────────────────────────────────────
  // Transform a path's local getBBox() into SVG root coordinates using getCTM().
  // Each path in the MTA SVG has matrix(1.333,0,0,-1.333,X,Y) which scales,
  // flips Y, and translates — so we must transform all 4 corners and re-min/max.
  function pathBBoxInRoot(el, svgEl) {
    const bb  = el.getBBox();
    if (bb.width === 0 && bb.height === 0) return null;
    const ctm = el.getCTM();
    if (!ctm) return null;
    const corners = [
      [bb.x,            bb.y           ],
      [bb.x + bb.width, bb.y           ],
      [bb.x,            bb.y + bb.height],
      [bb.x + bb.width, bb.y + bb.height],
    ].map(([px, py]) => {
      const p = svgEl.createSVGPoint();
      p.x = px; p.y = py;
      return p.matrixTransform(ctm);
    });
    return {
      x:  Math.min(...corners.map(c => c.x)),
      y:  Math.min(...corners.map(c => c.y)),
      x2: Math.max(...corners.map(c => c.x)),
      y2: Math.max(...corners.map(c => c.y)),
    };
  }

  // Greedy clustering: merge bboxes whose nearest edges are within `gap` units.
  // Returns a new array of merged bboxes. Each is {x, y, x2, y2}.
  function clusterBBoxes(bboxes, gap) {
    if (bboxes.length === 0) return [];
    const out = bboxes.map(b => ({ ...b }));
    let changed = true;
    while (changed) {
      changed = false;
      outer:
      for (let i = 0; i < out.length; i++) {
        for (let j = i + 1; j < out.length; j++) {
          const a = out[i], b = out[j];
          if (a.x2 + gap >= b.x && b.x2 + gap >= a.x &&
              a.y2 + gap >= b.y && b.y2 + gap >= a.y) {
            a.x  = Math.min(a.x,  b.x);
            a.y  = Math.min(a.y,  b.y);
            a.x2 = Math.max(a.x2, b.x2);
            a.y2 = Math.max(a.y2, b.y2);
            out.splice(j, 1);
            changed = true;
            break outer;
          }
        }
      }
    }
    return out;
  }

  // Compute clusters for all stations from a live (but off-screen) SVG element.
  function computeAllClusters(svgEl) {
    const clusters = {};
    for (const [stationId, station] of Object.entries(stationData)) {
      const bboxes = [];
      for (const pathId of station.paths) {
        const el = svgEl.querySelector(`#${pathId}`);
        if (!el) continue;
        try {
          const bb = pathBBoxInRoot(el, svgEl);
          if (bb) bboxes.push(bb);
        } catch (_) {}
      }
      clusters[stationId] = clusterBBoxes(bboxes, CLUSTER_GAP);
    }
    return clusters;
  }

  // ─── Build overlay layers ───────────────────────────────────────────────────
  const NS = 'http://www.w3.org/2000/svg';

  function makeRect(x, y, w, h, rx) {
    const r = document.createElementNS(NS, 'rect');
    r.setAttribute('x', x); r.setAttribute('y', y);
    r.setAttribute('width', w); r.setAttribute('height', h);
    r.setAttribute('rx', rx); r.setAttribute('ry', rx);
    return r;
  }

  // Hit targets: slightly enlarged transparent rects with pointer-events,
  // tagged with data-station-id so the click handler can find the station.
  function buildHitTargets() {
    for (const [stationId, clusters] of Object.entries(stationClusters)) {
      for (const c of clusters) {
        const w  = Math.max((c.x2 - c.x) + 2 * HIT_PAD, MIN_HIT_DIM);
        const h  = Math.max((c.y2 - c.y) + 2 * HIT_PAD, MIN_HIT_DIM);
        const cx = c.x - HIT_PAD - Math.max(0, (MIN_HIT_DIM - ((c.x2 - c.x) + 2 * HIT_PAD)) / 2);
        const cy = c.y - HIT_PAD - Math.max(0, (MIN_HIT_DIM - ((c.y2 - c.y) + 2 * HIT_PAD)) / 2);
        const rect = makeRect(cx, cy, w, h, HIT_PAD + 2);
        rect.setAttribute('fill', 'transparent');
        rect.setAttribute('pointer-events', 'all');
        rect.style.cursor = 'pointer';
        rect.dataset.stationId = stationId;
        hitLayer.appendChild(rect);
      }
    }
  }

  // ─── Visited markers ────────────────────────────────────────────────────────
  function addVisitedMarker(stationId) {
    const clusters = stationClusters[stationId];
    if (!clusters || clusters.length === 0) return;
    const g = document.createElementNS(NS, 'g');
    g.id = `vm-${stationId}`;
    for (const c of clusters) {
      const w   = Math.max((c.x2 - c.x) + 2 * MARK_PAD, MIN_MARK_DIM);
      const h   = Math.max((c.y2 - c.y) + 2 * MARK_PAD, MIN_MARK_DIM);
      const cx  = c.x - MARK_PAD - Math.max(0, (MIN_MARK_DIM - ((c.x2 - c.x) + 2 * MARK_PAD)) / 2);
      const cy  = c.y - MARK_PAD - Math.max(0, (MIN_MARK_DIM - ((c.y2 - c.y) + 2 * MARK_PAD)) / 2);
      const rect = makeRect(cx, cy, w, h, MARK_PAD + 3);
      rect.classList.add('visited-marker');
      g.appendChild(rect);
    }
    visitedOverlay.appendChild(g);
  }

  function removeVisitedMarker(stationId) {
    const el = document.getElementById(`vm-${stationId}`);
    if (el) el.remove();
  }

  // ─── Station click handling (delegation on overlay SVG) ─────────────────────
  overlaySvg.addEventListener('click', e => {
    if (pointerMoved) return;
    let el = e.target;
    while (el && el !== overlaySvg) {
      const sid = el.dataset?.stationId;
      if (sid) { toggleStation(sid); return; }
      el = el.parentElement;
    }
  });

  function toggleStation(stationId) {
    if (visitedStations.has(stationId)) {
      visitedStations.delete(stationId);
      removeVisitedMarker(stationId);
      showToast(`Removed: ${stationData[stationId].name}`);
    } else {
      visitedStations.add(stationId);
      addVisitedMarker(stationId);
      showToast(`Visited: ${stationData[stationId].name}`);
    }
    updatePanel();
    saveToCookie();
  }

  // ─── Panel ──────────────────────────────────────────────────────────────────
  function updatePanel() {
    const v = visitedStations.size;
    document.getElementById('stations-visited').textContent = v;
    const pct = totalStations > 0 ? (v / totalStations * 100) : 0;
    document.getElementById('stations-progress-fill').style.width = pct + '%';
  }

  // ─── Cookie ─────────────────────────────────────────────────────────────────
  function saveToCookie() {
    const data = JSON.stringify([...visitedStations]);
    const exp  = new Date(Date.now() + 365 * 24 * 3600 * 1000).toUTCString();
    document.cookie = `visitedStations=${encodeURIComponent(data)};expires=${exp};path=/`;
  }

  function loadFromCookie() {
    const match = document.cookie.split(';').map(c => c.trim())
      .find(c => c.startsWith('visitedStations='));
    if (!match) return;
    try {
      const ids = JSON.parse(decodeURIComponent(match.split('=').slice(1).join('=')));
      for (const id of ids) { visitedStations.add(id); addVisitedMarker(id); }
    } catch (e) { console.warn('Cookie parse error', e); }
  }

  // ─── Buttons ─────────────────────────────────────────────────────────────────
  document.getElementById('btn-reset').addEventListener('click', () => {
    if (!confirm('Reset all visited stations?')) return;
    visitedOverlay.innerHTML = '';
    visitedStations.clear();
    updatePanel(); saveToCookie();
  });

  document.getElementById('btn-share').addEventListener('click', () => {
    showToast('Share coming soon!');
  });

  // ─── Toast ──────────────────────────────────────────────────────────────────
  let _toastTimer = null;
  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2200);
  }

  // ─── Mouse pan ──────────────────────────────────────────────────────────────
  mapContainer.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    isDragging = true; pointerMoved = false;
    lastMouseX = e.clientX; lastMouseY = e.clientY;
    mapContainer.classList.add('dragging');
    document.body.style.cursor = 'grabbing';
    e.preventDefault();
  });

  window.addEventListener('mousemove', e => {
    if (!isDragging) return;
    const dx = e.clientX - lastMouseX, dy = e.clientY - lastMouseY;
    if (Math.abs(dx) + Math.abs(dy) > 4) pointerMoved = true;
    translateX += dx; translateY += dy;
    lastMouseX = e.clientX; lastMouseY = e.clientY;
    suspendHitTest();
    applyTransform();
  });

  window.addEventListener('mouseup', () => {
    if (!isDragging) return;
    isDragging = false;
    mapContainer.classList.remove('dragging');
    document.body.style.cursor = '';
    setTimeout(() => { pointerMoved = false; }, 50);
  });

  // ─── Wheel zoom ─────────────────────────────────────────────────────────────
  mapContainer.addEventListener('wheel', e => {
    e.preventDefault();
    const factor   = e.deltaY < 0 ? 1.08 : 1 / 1.08;
    const newScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, scale * factor));
    if (newScale === scale) return;
    const rect   = mapContainer.getBoundingClientRect();
    const mouseX = e.clientX - rect.left, mouseY = e.clientY - rect.top;
    translateX = mouseX - (mouseX - translateX) * (newScale / scale);
    translateY = mouseY - (mouseY - translateY) * (newScale / scale);
    scale = newScale;
    suspendHitTest();
    applyTransform();
  }, { passive: false });

  // ─── Touch ──────────────────────────────────────────────────────────────────
  let _lastTouchDist = null, _lastTouchMidX = 0, _lastTouchMidY = 0;

  mapContainer.addEventListener('touchstart', e => {
    if (e.touches.length === 1) {
      isDragging = true; pointerMoved = false;
      lastMouseX = e.touches[0].clientX; lastMouseY = e.touches[0].clientY;
    } else if (e.touches.length === 2) {
      isDragging = false;
      const dx = e.touches[1].clientX - e.touches[0].clientX;
      const dy = e.touches[1].clientY - e.touches[0].clientY;
      _lastTouchDist = Math.hypot(dx, dy);
      _lastTouchMidX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      _lastTouchMidY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    }
    e.preventDefault();
  }, { passive: false });

  mapContainer.addEventListener('touchmove', e => {
    if (e.touches.length === 1 && isDragging) {
      const dx = e.touches[0].clientX - lastMouseX, dy = e.touches[0].clientY - lastMouseY;
      if (Math.abs(dx) + Math.abs(dy) > 4) pointerMoved = true;
      translateX += dx; translateY += dy;
      lastMouseX = e.touches[0].clientX; lastMouseY = e.touches[0].clientY;
      suspendHitTest(); applyTransform();
    } else if (e.touches.length === 2 && _lastTouchDist !== null) {
      const dx    = e.touches[1].clientX - e.touches[0].clientX;
      const dy    = e.touches[1].clientY - e.touches[0].clientY;
      const dist  = Math.hypot(dx, dy);
      const midX  = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      const midY  = (e.touches[0].clientY + e.touches[1].clientY) / 2;
      const factor   = dist / _lastTouchDist;
      const newScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, scale * factor));
      const rect  = mapContainer.getBoundingClientRect();
      const relX  = midX - rect.left, relY = midY - rect.top;
      translateX  = relX - (relX - translateX) * (newScale / scale) + (midX - _lastTouchMidX);
      translateY  = relY - (relY - translateY) * (newScale / scale) + (midY - _lastTouchMidY);
      scale = newScale;
      _lastTouchDist = dist; _lastTouchMidX = midX; _lastTouchMidY = midY;
      suspendHitTest(); applyTransform();
    }
    e.preventDefault();
  }, { passive: false });

  mapContainer.addEventListener('touchend', e => {
    if (e.touches.length < 2) _lastTouchDist = null;
    if (e.touches.length === 0) { isDragging = false; setTimeout(() => { pointerMoved = false; }, 50); }
  });

  // ─── Init ───────────────────────────────────────────────────────────────────
  async function init() {
    const msgEl = loadingEl.querySelector('p');

    // ── 1. Fetch both resources in parallel ──
    msgEl.textContent = 'Fetching map data…';
    const [stationRes, svgRes] = await Promise.all([
      fetch('subway_station_mapping_2026-01-31.json'),
      fetch('subway_map.svg'),
    ]);
    const stationJson = await stationRes.json();
    const svgText     = await svgRes.text();

    stationData   = stationJson.stations;
    totalStations = stationJson.totalStations;
    document.getElementById('stations-total').textContent = totalStations;

    // ── 2. Inject SVG into an off-screen div to compute station bboxes ──
    // getBBox() + getCTM() require a rendered SVG element in the DOM.
    // We inject once, read geometry, then discard — the map itself is
    // displayed as an <img> (see step 3) for much faster pan/zoom.
    msgEl.textContent = 'Computing station positions…';
    const tempDiv = document.createElement('div');
    tempDiv.style.cssText =
      'position:fixed;left:-9999px;top:0;width:2208px;height:2688px;overflow:hidden;opacity:0;pointer-events:none';
    tempDiv.innerHTML = svgText;
    document.body.appendChild(tempDiv);
    const computeSVG = tempDiv.querySelector('svg');
    void computeSVG.getBoundingClientRect(); // force layout before geometry queries
    stationClusters = computeAllClusters(computeSVG);
    document.body.removeChild(tempDiv);

    // ── 3. Display the map as a GPU-composited image ──
    // Converting SVG text → Blob → object URL lets <img> rasterise it once.
    // All subsequent pan/zoom is a zero-cost compositor-layer operation.
    msgEl.textContent = 'Rendering map…';
    const blob   = new Blob([svgText], { type: 'image/svg+xml' });
    const imgUrl = URL.createObjectURL(blob);
    const mapImg = document.getElementById('map-img');
    await new Promise((resolve, reject) => {
      mapImg.onload  = resolve;
      mapImg.onerror = () => reject(new Error('SVG image failed to load'));
      mapImg.src = imgUrl;
    });

    // ── 4. Populate the overlay SVG ──
    buildHitTargets();

    // ── 5. Fit map to container ──
    const cw = mapContainer.offsetWidth, ch = mapContainer.offsetHeight;
    scale      = Math.min(cw / SVG_W, ch / SVG_H) * 0.97;
    translateX = (cw - SVG_W * scale) / 2;
    translateY = (ch - SVG_H * scale) / 2;
    applyTransform();

    // ── 6. Restore saved state ──
    loadFromCookie();
    updatePanel();
    loadingEl.style.display = 'none';
  }

  init().catch(err => {
    console.error(err);
    loadingEl.querySelector('p').textContent = 'Error: ' + err.message;
  });
</script>
</body>
</html>
